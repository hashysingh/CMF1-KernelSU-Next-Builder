name: Build Nothing Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git clang lld llvm bazel

      - name: Setup Workspace
        run: |
          mkdir -p android-kernel && cd android-kernel
          # Clone build orchestrator
          git clone -b mt6878/Tetris/16b https://github.com/NothingOSS/android_kernel_build_nothing_mt6878 build
          # Clone core kernel
          git clone -b mt6878/Tetris/16b https://github.com/NothingOSS/android_kernel_6.1_nothing_mt6878 common
          # Clone modules
          git clone -b mt6878/Tetris/16b https://github.com/NothingOSS/android_kernel_modules_nothing_mt6878 modules
          # Clone device modules
          git clone -b mt6878/Tetris/16b https://github.com/NothingOSS/android_kernel_device_modules_6.1_nothing_mt6878 device_modules

      - name: Execute Bazel Build
        run: |
          cd android-kernel
          # Kleaf build command
          # Note: The target name (e.g., //common:kernel_aarch64) 
          # depends on how the build repo defines the 'kernel' rule.
          # You may need to run `bazel query //...` first to find the exact target.
          bazel build //common:kernel_dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-dist
          path: android-kernel/dist/

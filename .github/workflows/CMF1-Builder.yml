name: Build Official Nothing CMF 1 Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft
          sudo rm -rf /opt/google

      - name: Install Compiler Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libelf-dev libssl-dev libcrypto++-dev git ccache zip unzip curl wget lld llvm python3

      - name: Clone Official Nothing Kernel Source
        run: |
          # Cloning the exact branch for the CMF Phone 1 (Tetris)
          git clone --depth=1 -b mt6878/Tetris/16b https://github.com/NothingOSS/android_kernel_6.1_nothing_mt6878.git kernel-6.1

      - name: Download Official AOSP Clang Compiler
        run: |
          mkdir -p toolchain
          cd toolchain
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/18bfb7fbd697a1ad710fd0581a4ac9f3db385f71/clang-r498229b.tar.gz
          tar -xf clang-r498229b.tar.gz
          rm clang-r498229b.tar.gz

      - name: Inject KernelSU-Next
        run: |
          cd kernel-6.1
          # Automatically downloads and sets up the KernelSU-Next source tree
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next

      - name: Configure Kernel Subsystem Flags
        run: |
          cd kernel-6.1
          # Force KernelSU configuration directly into Nothing's baseline configuration
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_WITH_KPROBES=n" >> arch/arm64/configs/gki_defconfig

      - name: Compile Nothing Kernel via Kbuild
        run: |
          cd kernel-6.1
          
          # Set up environment paths to use our downloaded AOSP Clang compiler
          export PATH="$(pwd)/../toolchain/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          
          echo "=== Generating Configuration ==="
          make O=out gki_defconfig
          
          echo "=== Starting Multicore Compilation ==="
          make -j$(nproc) O=out

      - name: Upload Finished Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: CMF1-Official-KernelSU-Next
          path: |
            kernel-6.1/out/arch/arm64/boot/Image
            kernel-6.1/out/arch/arm64/boot/Image.gz

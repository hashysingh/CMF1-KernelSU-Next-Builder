name: Build CMF Phone 1 Kernel

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bazel clang lld llvm python3

      - name: Checkout Repositories
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          # Clone the build orchestrator
          git clone https://github.com/NothingOSS/android_kernel_build_nothing_mt6878 build
          # Clone the core kernel source
          git clone https://github.com/NothingOSS/android_kernel_6.1_nothing_mt6878 common
          # Clone the modules
          git clone https://github.com/NothingOSS/android_kernel_modules_nothing_mt6878 modules
          # Clone the device modules
          git clone https://github.com/NothingOSS/android_kernel_device_modules_6.1_nothing_mt6878 device

      - name: Build Kernel
        run: |
          cd kernel_workspace
          # Execute the build script provided by the build repo
          # You may need to specify the correct target defined in the build repo
          ./build/build.sh
        env:
          # Kleaf usually requires specific environment variables
          # Check your build.config file for these names
          TARGET_PRODUCT: "nothing_mt6878"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-output
          path: kernel_workspace/out/
